<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>SPACE VOID — space shooter</title>
  <meta name="description" content="SPACE VOID — retro space shooter. Single, co-op and versus modes. Play in your browser.">
  <meta name="theme-color" content="#000000">
  <meta property="og:title" content="SPACE VOID">
  <meta property="og:description" content="Retro space shooter — play in your browser">
  <link rel="icon" type="image/png" href="assets/images/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    body { display: flex; align-items: center; justify-content: center; }
    #game {
      display: block;
      background: #000;
      touch-action: none;
      cursor: default;
    }
  </style>
</head>
<body>
  <canvas id="game" width="600" height="880"></canvas>
  <script type="module" src="js/main.js"></script>
</body>
</html>
