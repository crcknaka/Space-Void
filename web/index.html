<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Space Void</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas" width="600" height="880"></canvas>
      <div id="overlay"></div>
      <div id="ui-buttons">
        <button
          id="menu-button"
          class="ui-button glass-button glass-button--icon"
          aria-label="Open menu"
        >
          <span class="ui-button__label">MENU</span>
        </button>
      </div>
      <div id="touch-controls">
        <div id="touch-move" class="touch-move">
          <div class="touch-thumb"></div>
        </div>
        <div id="touch-move-2" class="touch-move touch-move--secondary">
          <div class="touch-thumb"></div>
        </div>
        <div class="touch-buttons">
          <button id="touch-shoot" class="touch-button glass-button glass-button--pill">Fire</button>
          <button id="touch-rocket" class="touch-button glass-button glass-button--pill">Rocket</button>
          <button id="touch-rocket-2" class="touch-button glass-button glass-button--pill">Rocket 2</button>
        </div>
      </div>
    </div>
    <script src="./js/shared.js"></script>
    <script src="./js/single-player.js"></script>
    <script src="./js/versus.js"></script>
    <script src="./js/coop.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/settings.js"></script>
    <script src="./js/game.js"></script>
  </body>
</html>
