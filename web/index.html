<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Void</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas" width="600" height="880"></canvas>
      <div id="overlay"></div>
      <div id="touch-controls">
        <div id="touch-move" class="touch-move"></div>
        <div class="touch-buttons">
          <button id="touch-shoot" class="touch-button">Fire</button>
          <button id="touch-rocket" class="touch-button">Rocket</button>
        </div>
      </div>
    </div>
    <script src="./js/game.js"></script>
  </body>
</html>
